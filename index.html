<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>triplescosmos</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <a href="index.html">
            <img src="logo/logo-triples.svg" alt="tripleS logo" class="logo" />
        </a>
        <a href="#">
            <img src="logo/menu.svg" alt="menu" class="menu-icon" />
        </a>
    </header>
    <section class="banner">
        <div class="slides-container">
            <div class="slides">
                <div class="slide active">
                    <img src="images-albums/banner-visionary_vision.png" alt="Visionary Vision" />
                </div>
                <div class="slide">
                    <img src="images-albums/banner-INNERDANCE.jpg" alt="Inner Dance" />
                </div>
                <div class="slide">
                    <img src="images-albums/banner-JUSTDOIT.jpg" alt="Just Do It" />
                </div>
                <div class="slide">
                    <img src="images-albums/banner-ASSEMBLE24.jpg" alt="Assemble 24" />
                </div>
                <div class="slide">
                    <img src="images-albums/banner-STRUCTUREOFSADNESS.jpg" alt="Structure of Sadness" />
                </div>
                <div class="slide">
                    <img src="images-albums/banner-MUHAN.jpg" alt="Muhan" />
                </div>
                <div class="slide">
                    <img src="images-albums/banner-MUJUK.jpg" alt="Mujuk" />
                </div>
                <div class="slide">
                    <img src="images-albums/banner-AESTHETIC.jpg" alt="Aesthetic" />
                </div>
                <div class="slide">
                    <img src="images-albums/banner-ASSEMBLE.jpg" alt="Assemble" />
                </div>
                <div class="slide">
                    <img src="images-albums/banner-ACCESS.jpg" alt="Access" />
                </div>
            </div>

            <div class="indicators">
                <button data-slide="0" class="active"></button>
                <button data-slide="1"></button>
                <button data-slide="2"></button>
                <button data-slide="3"></button>
                <button data-slide="4"></button>
                <button data-slide="5"></button>
                <button data-slide="6"></button>
                <button data-slide="7"></button>
                <button data-slide="9"></button>
                <button data-slide="10"></button>
            </div>
            <button class="prev">‹</button>
            <button class="next">›</button>
        </div>
    </section>
    <div class="name-btn" style="background: var(--s01);">
        <a href="member-s01.html">S1 | SEOYEON</a>
    </div>
    <div class="name-btn" style="background: var(--s02);">
        <a href="member-s02.html">S2 | HYERIN</a>
    </div>
    <div class="name-btn" style="background: var(--s03); color: black;">
        <a href="member-s02.html">S3 | JIWOO</a>
    </div>
    <div class="name-btn" style="background: var(--s04);">
        <a href="member-s04.html">S4 | CHAEYEON</a>
    </div>

    <a href="member-s01.html">
        <div class="member-card"
            style="background-image: linear-gradient(180deg, rgba(0, 0, 0, 0.00) 50%, rgba(0, 0, 0, 0.80) 100%), url('images-members/card-S01.jpg'); background-size: cover; background-repeat: no-repeat; background-position: center;">
            <div class="member-name">Seoyeon</div>
        </div>
    </a>
    <a href="member-hyerin.html">
        <div class="member-card"
            style="background-image: linear-gradient(180deg, rgba(0, 0, 0, 0.00) 50%, rgba(0, 0, 0, 0.80) 100%), url('images-members/card-S02.jpg'); background-size: cover; background-repeat: no-repeat; background-position: center;">
            <div class="member-name">Hyerin</div>
        </div>
    </a>
</body>

</html>
